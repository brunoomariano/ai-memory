name: release

# Triggered when a version tag is pushed, e.g. git push origin v0.2.0.
# Builds the Docker image and pushes it to Docker Hub with both the
# version tag and `latest`.
#
# Required secrets (set in repo Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — Docker Hub account name
#   DOCKERHUB_TOKEN     — Docker Hub access token (read/write)
#
# The CI workflow already validates the binary (fmt / clippy / test).
# This workflow assumes CI passed on the same commit; it only builds
# and pushes the image.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate the publish on the Docker Hub secrets actually being present, so a
  # fresh clone (or a fork) doesn't get a red failing run on every tag. The
  # docker job activates automatically once DOCKERHUB_USERNAME + _TOKEN are
  # set in repo Settings → Secrets and variables → Actions.
  check-secrets:
    name: check publish credentials
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set — skipping image publish. Add them in repo Settings → Secrets and variables → Actions to enable tag-triggered publishing."
          fi

  docker:
    name: docker build + push
    needs: check-secrets
    if: needs.check-secrets.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract the version from the tag (strips the leading "v").
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-memory:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-memory:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the published image
        run: |
          docker pull "${{ secrets.DOCKERHUB_USERNAME }}/ai-memory:${{ steps.version.outputs.VERSION }}"
          docker run --rm \
            "${{ secrets.DOCKERHUB_USERNAME }}/ai-memory:${{ steps.version.outputs.VERSION }}" \
            --version
